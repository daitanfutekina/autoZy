<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 260px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      background: #1a1a2e;
      color: #eee;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      text-align: center;
      color: #e94560;
    }
    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #666;
      margin: 10px 0 4px 2px;
    }
    .section-label:first-of-type {
      margin-top: 0;
    }
    button {
      display: block;
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 6px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover {
      transform: translateY(-1px);
    }
    button:active {
      transform: translateY(0);
    }
    #solveAll {
      background: #e94560;
      color: white;
      margin-bottom: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
    }
    #solveAll:hover { background: #d63851; }

    .btn-original {
      background: #0f3460;
      color: white;
    }
    .btn-original:hover { background: #1a4a7a; }

    .btn-new {
      background: #16213e;
      color: #ddd;
      border: 1px solid #0f3460;
    }
    .btn-new:hover { background: #1a2d52; }

    .footer {
      text-align: center;
      font-size: 10px;
      color: #555;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h2>AutoZy</h2>
  <button id="solveAll">Solve All</button>

  <div class="section-label">Original</div>
  <button id="solveAnimation" class="btn-original">Solve Animations</button>
  <button id="solveMC" class="btn-original">Solve Multiple Choice</button>
  <button id="solveSA" class="btn-original">Solve Short Answer</button>

  <div class="section-label">New</div>
  <button id="solveDragDrop" class="btn-new">Solve Drag &amp; Drop</button>
  <button id="solveClickable" class="btn-new">Solve Clickable</button>
  <button id="solveTable" class="btn-new">Solve Tables / Custom</button>

  <div class="footer">v2.0.0</div>
  <script src="popup.js"></script>
</body>
</html>
